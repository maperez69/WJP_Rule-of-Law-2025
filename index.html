<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero WJP 2025 - Análisis Profundo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- PropTypes (Requerido por Recharts UMD) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            Cell, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, Radar, Legend
        } = window.Recharts;

        const Icons = {
            Landmark: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="21" x2="21" y2="21"/><line x1="9" y1="21" x2="9" y2="11"/><line x1="15" y1="21" x2="15" y2="11"/><path d="M19 11v-3l-7-4-7 4v3"/><path d="M5 11h14"/></svg>,
            MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            TrendingDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>,
            AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
            Award: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>,
            Layers: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/></svg>
        };

        const DATA = {
            mexico: {
                score: 0.40, globalRank: 121, change: -2.8,
                factors: [
                    { name: 'Límites Poder', score: 0.41 },
                    { name: 'Anticorrupción', score: 0.26 },
                    { name: 'Gob. Abierto', score: 0.54 },
                    { name: 'Der. Fund.', score: 0.45 },
                    { name: 'Seguridad', score: 0.50 },
                    { name: 'Regulatorio', score: 0.42 },
                    { name: 'Justicia Civil', score: 0.36 },
                    { name: 'Justicia Penal', score: 0.27 },
                ]
            },
            benchmark: [
                { name: "Dinamarca", score: 0.90, fill: "#1e3a8a" },
                { name: "Uruguay", score: 0.72, fill: "#3b82f6" },
                { name: "Brasil", score: 0.50, fill: "#10b981" },
                { name: "Colombia", score: 0.47, fill: "#059669" },
                { name: "México", score: 0.40, fill: "#047857" },
                { name: "Venezuela", score: 0.26, fill: "#ef4444" },
            ],
            globalTrends: [
                { 
                    name: "Límites al Poder", 
                    decline: 68, 
                    desc: "Mide si el poder legislativo y judicial pueden supervisar efectivamente al gobierno. Su declive indica un preocupante avance del autoritarismo ejecutivo." 
                },
                { 
                    name: "Gobierno Abierto", 
                    decline: 66, 
                    desc: "Evalúa la transparencia de las leyes, el derecho a la información y la participación ciudadana. Menos apertura significa menos rendición de cuentas." 
                },
                { 
                    name: "Derechos Fundamentales", 
                    decline: 66, 
                    desc: "Incluye libertad de expresión y asamblea. Es el factor con mayor retroceso global debido a la represión de voces críticas y activistas." 
                },
                { 
                    name: "Justicia Civil", 
                    decline: 68, 
                    desc: "Mide si la justicia es accesible, rápida y libre de corrupción para ciudadanos comunes. Los retrasos y la influencia política están asfixiando este sistema." 
                },
                { 
                    name: "Justicia Penal", 
                    decline: 60, 
                    desc: "Evalúa la efectividad de la investigación policial y el respeto al debido proceso. Su baja refleja sistemas ineficientes o utilizados políticamente." 
                }
            ],
            top5: [
                { r: 1, n: "Dinamarca", s: 0.90 },
                { r: 2, n: "Noruega", s: 0.89 },
                { r: 3, n: "Finlandia", s: 0.87 },
                { r: 4, n: "Suecia", s: 0.85 },
                { r: 5, n: "N. Zelanda", s: 0.83 }
            ]
        };

        const StatCard = ({ title, value, sub, icon: Icon, color }) => (
            <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div className={`p-3 rounded-xl ${color} text-white shrink-0`}><Icon /></div>
                <div className="min-w-0">
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{title}</p>
                    <p className="text-xl md:text-2xl font-black text-slate-800">{value}</p>
                    <p className="text-[10px] text-slate-400 truncate">{sub}</p>
                </div>
            </div>
        );

        const App = () => {
            const [tab, setTab] = React.useState('mexico');

            return (
                <div className="max-w-6xl mx-auto px-4 py-6 md:py-10">
                    <header className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
                        <div>
                            <h1 className="text-3xl font-black text-slate-900 flex items-center gap-3">
                                <Icons.Landmark /> WJP 2025
                            </h1>
                            <p className="text-slate-500 font-medium">Estado de Derecho: Reporte Interactivo</p>
                        </div>
                        <div className="bg-emerald-100 text-emerald-800 px-4 py-2 rounded-xl text-sm font-bold border border-emerald-200 self-start flex items-center gap-2">
                            <Icons.MapPin /> Perfil México
                        </div>
                    </header>

                    <nav className="flex gap-2 mb-8 overflow-x-auto no-scrollbar pb-2">
                        {[
                            { id: 'mexico', l: '🇲🇽 México', i: Icons.MapPin },
                            { id: 'global', l: 'Tendencias', i: Icons.Globe },
                            { id: 'rankings', l: 'Rankings', i: Icons.Award },
                            { id: 'factores', l: 'Desglose Factores', i: Icons.Layers }
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`px-5 py-2.5 rounded-xl font-bold text-sm flex items-center gap-2 whitespace-nowrap transition-all ${tab === t.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'bg-white text-slate-500 border border-slate-200'}`}>
                                <t.i /> {t.l}
                            </button>
                        ))}
                    </nav>

                    {tab === 'mexico' && (
                        <div className="space-y-6 animate-in fade-in duration-500">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <StatCard title="Puntaje" value="0.40" sub="Escala 0 a 1" icon={Icons.MapPin} color="bg-emerald-600" />
                                <StatCard title="Rank Mundial" value="#121" sub="De 143 países" icon={Icons.TrendingDown} color="bg-rose-600" />
                                <StatCard title="Variación" value="-2.8%" sub="Declive anual" icon={Icons.AlertTriangle} color="bg-amber-500" />
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-slate-800 mb-6 uppercase text-xs tracking-widest">Radar: Fortalezas y Debilidades</h3>
                                    <div className="h-[300px] md:h-[350px]">
                                        <ResponsiveContainer>
                                            <RadarChart cx="50%" cy="50%" outerRadius="80%" data={DATA.mexico.factors}>
                                                <PolarGrid stroke="#e2e8f0" />
                                                <PolarAngleAxis dataKey="name" fontSize={10} fontWeight="bold" />
                                                <PolarRadiusAxis angle={30} domain={[0, 1]} tick={false} />
                                                <Radar name="México" dataKey="score" stroke="#059669" fill="#10b981" fillOpacity={0.5} />
                                                <Tooltip />
                                            </RadarChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-4 text-center leading-relaxed">
                                        <b>Síntesis México:</b> El país muestra resiliencia en Gobierno Abierto, pero enfrenta una crisis institucional profunda en Justicia Penal y Anticorrupción.
                                    </p>
                                </div>

                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                    <h3 className="font-black text-slate-800 mb-6 uppercase text-xs tracking-widest">Benchmark Regional</h3>
                                    <div className="h-[300px] md:h-[350px]">
                                        <ResponsiveContainer>
                                            <BarChart data={DATA.benchmark} layout="vertical" margin={{ left: 10, right: 30 }}>
                                                <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#f1f5f9" />
                                                <XAxis type="number" domain={[0, 1]} hide />
                                                <YAxis dataKey="name" type="category" fontSize={10} width={80} fontWeight="bold" />
                                                <Tooltip />
                                                <Bar dataKey="score" radius={[0, 5, 5, 0]} barSize={20}>
                                                    {DATA.benchmark.map((e, i) => <Cell key={i} fill={e.fill} />)}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="mt-4 p-4 bg-slate-50 rounded-xl">
                                        <p className="text-[11px] text-slate-600 leading-relaxed font-medium">
                                            <b>Contexto:</b> México se ubica por debajo del promedio regional y está perdiendo terreno frente a economías similares como Brasil y Colombia.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'global' && (
                        <div className="space-y-6">
                            <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm text-center space-y-6">
                                <Icons.Globe />
                                <h2 className="text-2xl font-black text-slate-900">Síntesis de la Recesión Global</h2>
                                <p className="text-slate-500 max-w-2xl mx-auto text-sm leading-relaxed">
                                    El declive del Estado de Derecho no es solo una cifra, es una <b>crisis de gobernanza</b>. En 2025, el motor principal es el aumento del autoritarismo que erosiona la independencia de jueces y legisladores, cerrando espacios de participación cívica.
                                </p>
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mt-8">
                                    <div className="p-4 rounded-2xl bg-rose-50 border border-rose-100">
                                        <p className="text-2xl font-black text-rose-600">68%</p>
                                        <p className="text-[9px] font-bold text-rose-400 uppercase">Países que caen</p>
                                    </div>
                                    <div className="p-4 rounded-2xl bg-amber-50 border border-amber-100">
                                        <p className="text-2xl font-black text-amber-600">70%</p>
                                        <p className="text-[9px] font-bold text-amber-400 uppercase">Erosión Cívica</p>
                                    </div>
                                    <div className="p-4 rounded-2xl bg-blue-50 border border-blue-100">
                                        <p className="text-2xl font-black text-blue-600">61%</p>
                                        <p className="text-[9px] font-bold text-blue-400 uppercase">Ataque Judicial</p>
                                    </div>
                                    <div className="p-4 rounded-2xl bg-slate-50 border border-slate-100">
                                        <p className="text-2xl font-black text-slate-800">0.55</p>
                                        <p className="text-[9px] font-bold text-slate-400 uppercase">Media Global</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'rankings' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <h3 className="font-black text-slate-800 mb-6 uppercase text-xs tracking-widest text-emerald-600">Top 5 Mundial (Líderes)</h3>
                                {DATA.top5.map(i => (
                                    <div key={i.r} className="flex justify-between items-center py-3 border-b border-slate-50 last:border-0">
                                        <span className="text-sm font-bold text-slate-600">#{i.r} {i.n}</span>
                                        <span className="bg-slate-100 px-3 py-1 rounded-lg text-xs font-black text-slate-800">{i.s}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-slate-900 p-6 rounded-2xl text-white shadow-xl">
                                <h3 className="font-black mb-6 uppercase text-xs tracking-widest text-blue-400">Análisis: México en el Ranking</h3>
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center p-4 bg-slate-800 rounded-xl border border-slate-700">
                                        <span className="font-bold">#121 México</span>
                                        <span className="text-xl font-black">0.40</span>
                                    </div>
                                    <p className="text-xs text-slate-400 leading-relaxed">
                                        México comparte posición con países como Nigeria y Turquía. En Latinoamérica, el país ocupa el lugar 27 de 32, solo superando a naciones con crisis institucionales extremas como Venezuela o Haití.
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'factores' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {DATA.globalTrends.map((f, i) => (
                                <div key={i} className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between hover:border-blue-200 transition-colors">
                                    <div>
                                        <h4 className="font-black text-slate-800 text-sm mb-3 flex justify-between items-center">
                                            {f.name}
                                            <span className="text-rose-500 font-black">{f.decline}% ↓</span>
                                        </h4>
                                        <p className="text-[11px] text-slate-500 leading-relaxed mb-4">
                                            {f.desc}
                                        </p>
                                    </div>
                                    <div className="w-full bg-slate-100 h-1.5 rounded-full">
                                        <div className="bg-rose-500 h-1.5 rounded-full" style={{ width: `${f.decline}%` }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <footer className="mt-16 pt-8 border-t border-slate-200 text-center space-y-2">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">© 2025 World Justice Project | Data Intelligence</p>
                        <p className="text-[10px] text-slate-300">Resumen conceptual de factores y tendencias globales</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
